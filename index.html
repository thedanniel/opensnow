<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>OpenSearch / Snowflake Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    /* Toggle */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: bold;
      color: #555;
      cursor: pointer;
      transition: color 0.2s;
    }

    .toggle-label.active {
      color: #007bff;
    }

    .toggle {
      position: relative;
      width: 52px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      margin: 0;
      padding: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #007bff;
      border-radius: 26px;
      transition: background-color 0.3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    input:checked + .slider {
      background-color: #6f42c1;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    /* Buttons */
    .btn-opensearch {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn-opensearch:hover { background: #0056b3; }

    .btn-snowflake {
      background: #6f42c1;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn-snowflake:hover { background: #4e2d89; }

    /* Query output */
    .query-output {
      display: none;
      margin-top: 14px;
    }

    .query-output textarea {
      width: 100%;
      height: 130px;
      padding: 10px;
      font-family: monospace;
      font-size: 13px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: #f8f8f8;
      resize: vertical;
      margin-top: 0;
    }

    .btn-copy {
      background: #28a745;
      margin-top: 6px;
    }

    .btn-copy:hover { background: #1e7e34; }

    .copied-msg {
      display: none;
      color: #28a745;
      font-size: 13px;
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="title">Generate OpenSearch Link</h2>

  <!-- Toggle -->
  <div class="toggle-wrapper">
    <span class="toggle-label active" id="label-opensearch" onclick="setMode('opensearch')">OpenSearch</span>
    <label class="toggle">
      <input type="checkbox" id="modeToggle" onchange="onToggleChange()">
      <span class="slider"></span>
    </label>
    <span class="toggle-label" id="label-snowflake" onclick="setMode('snowflake')">Snowflake</span>
  </div>

  <label>Player ID</label>
  <input type="text" id="playerId" placeholder="Digite o Player ID">

  <label>Ticket Code</label>
  <input type="text" id="ticketCode" placeholder="Digite o Ticket Code">

  <label>Start Date</label>
  <input type="date" id="startDate">

  <label>End Date</label>
  <input type="date" id="endDate">

  <!-- OpenSearch button -->
  <button class="btn-opensearch" id="btn-opensearch" onclick="gerarLinkOpenSearch()">See in OpenSearch</button>

  <!-- Snowflake button -->
  <button class="btn-snowflake" id="btn-snowflake" style="display:none;" onclick="gerarQuerySnowflake()">Generate Snowflake Query</button>

  <!-- Query output area (Snowflake mode) -->
  <div class="query-output" id="queryOutput">
    <textarea id="queryText" readonly></textarea>
    <button class="btn-snowflake btn-copy" onclick="copiarQuery()">Copy Query</button>
    <div class="copied-msg" id="copiedMsg">✓ Copied!</div>
  </div>
</div>

<script>
  let currentMode = 'opensearch';

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeToggle').checked = (mode === 'snowflake');
    updateUI();
  }

  function onToggleChange() {
    currentMode = document.getElementById('modeToggle').checked ? 'snowflake' : 'opensearch';
    updateUI();
  }

  function updateUI() {
    const isSnowflake = currentMode === 'snowflake';

    document.getElementById('title').textContent = isSnowflake ? 'Gerar Query Snowflake' : 'Gerar Link OpenSearch';

    document.getElementById('label-opensearch').classList.toggle('active', !isSnowflake);
    document.getElementById('label-snowflake').classList.toggle('active', isSnowflake);

    document.getElementById('btn-opensearch').style.display = isSnowflake ? 'none' : 'block';
    document.getElementById('btn-snowflake').style.display  = isSnowflake ? 'block' : 'none';

    // Hide query output when switching back
    document.getElementById('queryOutput').style.display = 'none';
    document.getElementById('copiedMsg').style.display = 'none';
  }

  function gerarLinkOpenSearch() {
    const playerId   = document.getElementById("playerId").value.trim();
    const ticketCode = document.getElementById("ticketCode").value.trim();
    const startDate  = document.getElementById("startDate").value;
    const endDate    = document.getElementById("endDate").value;

    if (!playerId || !ticketCode || !startDate || !endDate) {
      alert("Preencha todos os campos!");
      return;
    }

    const from = startDate + "T00:00:00.000Z";
    const to   = endDate   + "T23:59:59.999Z";

    const base = "https://open-search-critical.services.production.betler.superbet.com/_dashboards/app/data-explorer/discover?security_tenant=global";

    const _a = "(discover:(columns:!(metadata.ticket_code,domain,action,amount,summary.uncommitted,summary.committed,transaction_amount_cash.uncommitted,transaction_amount_cash.committed,transaction_id,denied_reason,funding_type,summary.bonus),isDirty:!t,sort:!()),metadata:(indexPattern:b4bd6b80-55f3-11ed-9502-23ca8b926764,view:discover))";

    const _g = "(filters:!(),refreshInterval:(pause:!t,value:0),time:(from:'" + from + "',to:'" + to + "'))";

    const _q = "(" +
      "filters:!(" +
        "('$state':(store:appState),meta:(alias:!n,disabled:!f,index:b4bd6b80-55f3-11ed-9502-23ca8b926764,key:customer_id,negate:!f,params:(query:'" + playerId + "'),type:phrase),query:(match_phrase:(customer_id:'" + playerId + "')))," +
        "('$state':(store:appState),meta:(alias:!n,disabled:!f,index:b4bd6b80-55f3-11ed-9502-23ca8b926764,key:domain,negate:!f,params:(query:sportsbook),type:phrase),query:(match_phrase:(domain:sportsbook)))," +
        "('$state':(store:appState),meta:(alias:!n,disabled:!f,index:b4bd6b80-55f3-11ed-9502-23ca8b926764,key:metadata.ticket_code,negate:!f,params:(query:'" + ticketCode + "'),type:phrase),query:(match_phrase:(metadata.ticket_code:'" + ticketCode + "')))" +
      ")," +
      "query:(language:kuery,query:'')" +
    ")";

    const fragment = "#?_a=" + encodeURIComponent(_a) +
                     "&_g=" + encodeURIComponent(_g) +
                     "&_q=" + encodeURIComponent(_q);

    window.open(base + fragment, "_blank");
  }

  function gerarQuerySnowflake() {
    const playerId   = document.getElementById("playerId").value.trim();
    const ticketCode = document.getElementById("ticketCode").value.trim();
    const startDate  = document.getElementById("startDate").value;
    const endDate    = document.getElementById("endDate").value;

    if (!playerId || !ticketCode || !startDate || !endDate) {
      alert("Fill all the fields!");
      return;
    }

    const query =
`SELECT *
FROM dwh.f_wallet_transaction
WHERE player_id = '${playerId}'
  AND ticket_code = '${ticketCode}'
  AND transaction_dt >= '${startDate} 00:00:00'
  AND transaction_dt <= '${endDate} 23:59:59'
ORDER BY transaction_dt;`;

    document.getElementById('queryText').value = query;
    document.getElementById('queryOutput').style.display = 'block';
    document.getElementById('copiedMsg').style.display = 'none';
  }

  function copiarQuery() {
    const text = document.getElementById('queryText').value;
    navigator.clipboard.writeText(text).then(() => {
      const msg = document.getElementById('copiedMsg');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    });
  }
</script>

</body>
</html>
